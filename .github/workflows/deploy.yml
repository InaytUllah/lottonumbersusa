name: Build and deploy to Cloudflare Pages

# Bypasses Cloudflare's dashboard build pipeline. GitHub Actions builds
# locally and uses wrangler to push the `out/` folder to Cloudflare Pages.
#
# Triggers:
#  - Push to main (any code change)
#  - Scheduled cron after Powerball / Mega Millions draws (UTC)
#  - Manual via workflow_dispatch
#
# Draw publication windows (UTC, covers both EDT and EST):
#  - Powerball:      Mon/Wed/Sat 22:59 ET  →  next-day UTC Tue/Thu/Sun 02:59-04:00
#  - Mega Millions:  Tue/Fri 23:00 ET      →  next-day UTC Wed/Sat 03:00-04:00
# We poll every 10 min between 03:00-05:00 UTC on the days *after* a draw,
# which covers both daylight saving and standard time and gives the NY Open
# Data feed time to publish.
#
# Required GitHub secrets:
#  - CLOUDFLARE_API_TOKEN  (Pages — Edit)
#  - CLOUDFLARE_ACCOUNT_ID
#  - GOOGLE_SERVICE_ACCOUNT_JSON (optional, only for notify-google job)

on:
  push:
    branches: [main]
  schedule:
    # Every 10 min from 03:00-04:59 UTC on Tue, Wed, Thu, Sat, Sun
    # (days following Powerball Mon/Wed/Sat + MM Tue/Fri draws)
    - cron: '*/10 3-4 * * 2,3,4,6,0'
    # Daily indexing nudge at 06:07 UTC (well after all draws settled)
    - cron: '7 6 * * *'
  workflow_dispatch:

# Avoid concurrent runs racing the same deploy
concurrency:
  group: cloudflare-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Ensure Pages project exists
        # wrangler pages deploy does NOT auto-create the project; we must.
        # continue-on-error so subsequent runs (when project already exists)
        # don't fail.
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create lottonumbersusa --production-branch=main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --project-name=lottonumbersusa --branch=main --commit-dirty=true

  notify-google:
    # Only run on the daily 06:07 UTC nudge or manual trigger.
    if: github.event.schedule == '7 6 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Submit URLs to Google Indexing API
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/notify-google.mjs
